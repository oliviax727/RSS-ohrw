<!DOCTYPE html>

<head>
    <!-- For search engines -->
    <meta charset="UTF-8">
    <meta name="description" content="Olivia (Oliviax727) Walters' RSS Feed. A GitHub pages website for reading the news.">
    <meta name="keywords" content="Olivia, Walters, OHRW, OHRF, Homepage, Filipovic, Website, GitHub, Pages">
    <meta name="identifier-URL" content="https://oliviax727.github.io">
    <meta name="author" content="Olivia Walters">
    <meta name="owner" content="@Oliviax727">
    <meta name="copyright" content="Olivia Walters">
    <meta name="robots" content="all">
    <meta name="coverage" content="Worldwide">
    <meta name="distribution" content="Global">

    <!-- Suggested for phone compatability -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Normalise CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-normalize@3.0.1/modern-normalize.min.css">

    <!-- Title and icons -->
    <link href="src/img/favicons/uranuscon.png" sizes="16x16" rel="icon"/>
    <title>OHRW's News Feed</title>

    <!-- Styling -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="src/css/rss-feed.css">

    <!-- Scripts, native and API -->
    <script src="index.js" type="module"></script>
    <script src="bundle.js" type="module"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@3?register"></script>

	<!-- MathJax -->
	<!-- LTeX: enabled=false -->
	<script>
		window.MathJax = {
			tex: {
				inlineMath: [['$', '$'], ['\\(', '\\)']],
				displayMath: [['$$', '$$'], ['\\[', '\\]']]
			}
		};
	</script>
	<!-- LTeX: enabled=true -->
	<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>

    <!--RSS Feeds-->
    <link rel="alternate" type="application/rss+xml" title="News Feed" href="src/data/test_feed.xml">
    <link rel="alternate" type="application/rss+xml" title="Old ABC Feed" href="src/data/old_abc_feed.xml">
    <link rel="alternate" type="application/rss+xml" title="Old XML Feed" href="src/data/old_arxiv_feed.xml">
</head>

<body>
	<!-- Loading Screen - no JS functionality -->
	<div id="loading-screen">
		<div id="loading-window">
			<div id="loading-content">
				<img src="src/img/icons/loading.gif">
				<p>Loading Page …</p>
			</div>
		</div>
	</div>

    <!-- Sidebar div (only on crunch) -->
    <div hidden id="menu-wrapper" html-ref="src/layout/menu.html"></div>

    <!-- Title/Ribbon div -->
    <div id="ribbon-wrapper" class="primary-color-css" html-ref="src/layout/ribbon.html"></div>
    <br>

    <!-- Main content div -->
    <div class="flexdiv" id="content-wrapper">
    </div>
    <br>

    <!-- Footer div -->
    <div id="footer-wrapper" class="footer-wrapper" html-ref="src/layout/footer.html">
    </div>
</body>
